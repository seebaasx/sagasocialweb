<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGASOCIAL STUDIO | Visual Storyteller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0e0e0e; color: #f0f0f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .hero-title { font-family: 'Archivo Black', sans-serif; line-height: 0.8; letter-spacing: -0.05em; }
        .outline-text { -webkit-text-stroke: 1.5px rgba(255,255,255,0.4); color: transparent; transition: all 0.5s; }
        .outline-text:hover { color: white; -webkit-text-stroke: 1.5px transparent; }
        .noise { position: fixed; inset: 0; z-index: 100; pointer-events: none; opacity: 0.03; background-image: url('https://grainy-gradients.vercel.app/noise.svg'); mix-blend-mode: overlay; }
        .cursor { position: fixed; width: 16px; height: 16px; background: white; border-radius: 50%; z-index: 9999; pointer-events: none; mix-blend-mode: difference; transition: transform 0.1s linear; }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="cursor" id="cursor"></div>

    <nav class="fixed top-8 left-1/2 -translate-x-1/2 z-[150] flex items-center gap-2 p-1.5 bg-white/5 backdrop-blur-xl border border-white/10 rounded-full">
        <a href="#inicio" class="px-6 py-2.5 rounded-full text-[10px] font-bold uppercase tracking-widest text-white/50 hover:text-white transition-all">Inicio</a>
        <a href="#trabajo" class="px-6 py-2.5 rounded-full text-[10px] font-bold uppercase tracking-widest text-white/50 hover:text-white transition-all">Trabajo</a>
        <a href="#contacto" class="px-6 py-2.5 rounded-full text-[10px] font-bold uppercase tracking-widest text-white/50 hover:text-white transition-all">Contacto</a>
    </nav>

    <section id="inicio" class="relative h-screen flex flex-col justify-center px-6 md:px-20">
        <div class="max-w-7xl w-full mx-auto">
            <span class="text-xs font-black uppercase tracking-[0.4em] text-white/30 mb-8 block">Social Media · Video · Design</span>
            <h1 class="text-[15vw] md:text-[11vw] hero-title uppercase">
                VISUAL <br>
                <span class="outline-text italic">STORY</span>TELLER.
            </h1>
            <div class="mt-12 flex flex-col md:flex-row gap-8 items-start">
                <p class="text-white/50 max-w-sm text-lg font-light leading-relaxed">Transformando la visión de marcas contemporáneas en realidades digitales.</p>
                <a href="#trabajo" class="flex items-center gap-4 text-xs font-bold uppercase tracking-widest border border-white/20 px-8 py-5 rounded-full hover:bg-white hover:text-black transition-all">
                    Explorar <i data-lucide="move-up-right" class="w-4 h-4"></i>
                </a>
            </div>
        </div>
    </section>

    <section id="trabajo" class="py-32 px-6 md:px-20 bg-[#0a0a0a]">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-6xl font-black uppercase italic mb-20 tracking-tighter">TRABAJOS.</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-20">
                <div class="group cursor-pointer">
                    <div class="relative aspect-[4/5] overflow-hidden rounded-2xl bg-neutral-900">
                        <img src="https://images.unsplash.com/photo-1536240478700-b869070f9279?w=1200&q=80" class="w-full h-full object-cover opacity-80 group-hover:scale-105 transition-all duration-700">
                    </div>
                    <h3 class="mt-8 text-3xl font-black uppercase tracking-tighter">URBAN MOTION</h3>
                </div>
                <div class="group cursor-pointer md:mt-32">
                    <div class="relative aspect-[4/5] overflow-hidden rounded-2xl bg-neutral-900">
                        <img src="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=1200&q=80" class="w-full h-full object-cover opacity-80 group-hover:scale-105 transition-all duration-700">
                    </div>
                    <h3 class="mt-8 text-3xl font-black uppercase tracking-tighter">DIGITAL PULSE</h3>
                </div>
            </div>
        </div>
    </section>

    <footer id="contacto" class="py-40 px-6 md:px-20 border-t border-white/5">
        <h2 class="text-[12vw] hero-title italic opacity-20">READY?</h2>
        <div class="mt-12 flex gap-12">
            <a href="#" class="text-xs font-black uppercase tracking-widest text-white/30 hover:text-white">Instagram</a>
            <a href="#" class="text-xs font-black uppercase tracking-widest text-white/30 hover:text-white">Email</a>
        </div>
    </footer>

    <script>
        // Inicializar Iconos
        lucide.createIcons();

        // Cursor lógico
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
