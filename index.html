<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGA MEDIA STUDIO | Digital Archive</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Syne:wght@700;800&family=Space+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #0a0a0a; --accent: #ffffff; }
        body { background-color: var(--bg); color: #f0f0f0; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        h1, h2, h3, .syne { font-family: 'Syne', sans-serif; }
        .mono { font-family: 'Space Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; }

        /* Efecto SAGA */
        .outline-text {
            -webkit-text-stroke: 1px rgba(255,255,255,0.4);
            color: transparent;
            transition: all 0.5s ease;
        }
        .outline-text:hover { color: white; -webkit-text-stroke: 1px transparent; }

        /* Tarjetas de Trabajo Modernas */
        .work-card {
            position: relative;
            background: #111;
            border-radius: 24px;
            overflow: hidden;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .work-card:hover { transform: translateY(-10px); }
        .work-card img {
            transition: transform 0.8s ease, filter 0.5s ease;
            filter: grayscale(100%) brightness(0.7);
        }
        .work-card:hover img { transform: scale(1.05); filter: grayscale(0%) brightness(1); }

        /* Cursor */
        #cursor {
            position: fixed; width: 12px; height: 12px; background: white;
            border-radius: 50%; pointer-events: none; z-index: 9999;
            mix-blend-difference: difference; left: -6px; top: -6px;
            will-change: transform; transition: transform 0.1s ease-out;
        }

        .glass-panel {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.05);
        }

        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="md:cursor-none">
    <div id="cursor"></div>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [filter, setFilter] = useState('Todos');
            const [selected, setSelected] = useState(null);

            useEffect(() => {
                const cursor = document.getElementById('cursor');
                const move = (e) => {
                    if(cursor) cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
                };
                window.addEventListener('mousemove', move);
                lucide.createIcons();
                return () => window.removeEventListener('mousemove', move);
            }, []);

            useEffect(() => { lucide.createIcons(); }, [filter, selected]);

            const projects = [
                { id: 1, title: "URBAN MOTION", cat: "Video", tag: "Creative Edit", img: "https://images.unsplash.com/photo-1536240478700-b869070f9279?w=800", desc: "Narrativa urbana de alto impacto.", items: [{type:'video', url: "https://www.w3schools.com/html/mov_bbb.mp4"}] },
                { id: 2, title: "NEO BRAND", cat: "Diseño", tag: "Identity", img: "https://images.unsplash.com/photo-1634942537034-2531766767d7?w=800", desc: "Sistemas visuales minimalistas.", items: [{type:'image', url: "https://images.unsplash.com/photo-1634942537034-2531766767d7?w=1200"}] },
                { id: 3, title: "SONIC VISUALS", cat: "Video", tag: "Music Video", img: "https://images.unsplash.com/photo-1492691523567-30730029d031?w=800", desc: "Sincronía sonora y visual.", items: [{type:'video', url: "https://www.w3schools.com/html/movie.mp4"}] }
            ];

            const filtered = filter === 'Todos' ? projects : projects.filter(p => p.cat === filter);

            return (
                <main>
                    {/* Hero */}
                    <section className="h-screen flex items-center justify-center px-6">
                        <div className="text-center">
                            <p className="mono mb-6 opacity-40">// digital archive _ 2026</p>
                            <h1 className="text-[12vw] md:text-[10vw] font-black uppercase leading-[0.8] mb-12">
                                <span className="outline-text">SAGA</span> <br /> MEDIA STUDIO.
                            </h1>
                            <a href="#work" className="mono border border-white/20 px-8 py-4 rounded-full hover:bg-white hover:text-black transition-all inline-flex items-center gap-3">
                                ver trabajos <i data-lucide="arrow-down" style={{width:14}}></i>
                            </a>
                        </div>
                    </section>

                    {/* Works Grid */}
                    <section id="work" className="py-32 px-6 md:px-20">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex justify-between items-end mb-20 border-b border-white/10 pb-10">
                                <h2 className="text-5xl font-bold italic uppercase">Proyectos.</h2>
                                <div className="flex gap-6 mono">
                                    {['Todos', 'Video', 'Diseño'].map(f => (
                                        <button key={f} onClick={() => setFilter(f)} className={`${filter === f ? 'text-white underline underline-offset-8' : 'opacity-30 hover:opacity-100'}`}>{f}</button>
                                    ))}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                {filtered.map(p => (
                                    <div key={p.id} className="work-card group cursor-none" onClick={() => { setSelected(p); document.body.style.overflow='hidden'; }}>
                                        <div className="aspect-[16/10] overflow-hidden">
                                            <img src={p.img} className="w-full h-full object-cover" />
                                        </div>
                                        <div className="p-8 flex justify-between items-center">
                                            <div>
                                                <p className="mono opacity-40 mb-2">{p.cat} / {p.tag}</p>
                                                <h3 className="text-3xl font-black">{p.title}</h3>
                                            </div>
                                            <div className="w-12 h-12 rounded-full border border-white/10 flex items-center justify-center group-hover:bg-white group-hover:text-black transition-all">
                                                <i data-lucide="plus"></i>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Project Drawer / Modal */}
                    {selected && (
                        <div className="fixed inset-0 z-[1000] flex justify-end">
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={() => { setSelected(null); document.body.style.overflow='auto'; }}></div>
                            <div className="relative w-full md:w-[60%] lg:w-[45%] h-full glass-panel p-10 md:p-20 overflow-y-auto animate-in slide-in-from-right duration-500">
                                <button onClick={() => { setSelected(null); document.body.style.overflow='auto'; }} className="mono mb-10 flex items-center gap-2 hover:opacity-50"><i data-lucide="arrow-left" style={{width:14}}></i> cerrar</button>
                                <p className="mono opacity-40 mb-4">{selected.cat} _ case study</p>
                                <h2 className="text-6xl font-black uppercase mb-8 italic">{selected.title}</h2>
                                <p className="text-xl text-white/60 font-light leading-relaxed mb-16">{selected.desc}</p>
                                
                                <div className="space-y-10">
                                    {selected.items.map((item, i) => (
                                        <div key={i} className="rounded-3xl overflow-hidden border border-white/10 bg-white/5">
                                            {item.type === 'video' ? (
                                                <video src={item.url} controls className="w-full" />
                                            ) : (
                                                <img src={item.url} className="w-full" />
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    <footer id="contacto" className="py-20 text-center border-t border-white/5">
                        <p className="mono opacity-20">© 2026 SAGA MEDIA STUDIO</p>
                    </footer>
                </main>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
