<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGA | Social Media Studio</title>
    
    <!-- TAILWIND CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FUENTES: Syne para impacto y Inter para legibilidad -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --accent: #ffffff;
            --muted: rgba(255, 255, 255, 0.4);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg);
            margin: 0;
            overflow-x: hidden;
            color: #fff;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, .saga-display { 
            font-family: 'Syne', sans-serif; 
            letter-spacing: -0.04em;
        }
        
        /* Efecto de ruido analógico */
        .noise {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            opacity: 0.03;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
        }

        /* Orbes de fondo dinámicos */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.15;
            pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        /* Scrollbar minimalista */
        .custom-scrollbar::-webkit-scrollbar { width: 2px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }

        /* Cursor Premium */
        #cursor-dot {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            will-change: transform;
            transition: width 0.3s, height 0.3s, background 0.3s;
        }
        #cursor-blur {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            will-change: transform;
            transition: transform 0.15s ease-out, width 0.3s, height 0.3s;
        }

        @media (max-width: 768px) {
            #cursor-dot, #cursor-blur { display: none; }
        }

        /* Animación de entrada de texto */
        .mask-text {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
            display: block;
        }
        
        @keyframes reveal-up {
            from { transform: translateY(110%); }
            to { transform: translateY(0); }
        }
        .reveal-up { 
            animation: reveal-up 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }

        /* Glassmorphism Refinado */
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .project-card {
            transition: all 0.6s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .project-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
        }

        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="cursor-none">
    <div id="cursor-dot"></div>
    <div id="cursor-blur"></div>
    <div class="noise"></div>
    
    <!-- Orbes Decorativos -->
    <div class="orb w-[500px] h-[500px] bg-purple-500 top-[-200px] left-[-100px]"></div>
    <div class="orb w-[400px] h-[400px] bg-blue-500 bottom-[-100px] right-[-100px]"></div>

    <div id="root"></div>

    <!-- DEPENDENCIAS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- LÓGICA REACT -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [activeFilter, setActiveFilter] = useState('Todos');
            const [isLoaded, setIsLoaded] = useState(false);
            const [selectedProject, setSelectedProject] = useState(null);
            const [activeMedia, setActiveMedia] = useState(null);

            useEffect(() => {
                setIsLoaded(true);
                const dot = document.getElementById('cursor-dot');
                const blur = document.getElementById('cursor-blur');

                const moveCursor = (e) => {
                    const { clientX: x, clientY: y } = e;
                    requestAnimationFrame(() => {
                        dot.style.transform = `translate3d(${x - 4}px, ${y - 4}px, 0)`;
                        blur.style.transform = `translate3d(${x - 20}px, ${y - 20}px, 0)`;
                    });
                };

                const handleHover = (e) => {
                    if (e.target.closest('button, a, .interactive')) {
                        dot.style.transform += ' scale(3)';
                        dot.style.opacity = '0.5';
                        blur.style.width = '60px';
                        blur.style.height = '60px';
                    } else {
                        dot.style.transform = dot.style.transform.replace(' scale(3)', '');
                        dot.style.opacity = '1';
                        blur.style.width = '40px';
                        blur.style.height = '40px';
                    }
                };

                window.addEventListener('mousemove', moveCursor);
                window.addEventListener('mouseover', handleHover);
                if (window.lucide) window.lucide.createIcons();

                return () => {
                    window.removeEventListener('mousemove', moveCursor);
                    window.removeEventListener('mouseover', handleHover);
                };
            }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [activeFilter, selectedProject, activeMedia]);

            const projects = [
                { 
                    id: 1, 
                    title: "NEON VELOCITY", 
                    category: "Video", 
                    img: "https://images.unsplash.com/photo-1536240478700-b869070f9279?w=1200&q=80", 
                    tag: "Production",
                    span: "col-span-1 md:col-span-2",
                    description: "Capturando la esencia del movimiento urbano a través de una edición cinética de alta frecuencia.",
                    items: [
                        { type: 'video', url: "https://www.w3schools.com/html/mov_bbb.mp4", thumb: "https://images.unsplash.com/photo-1536240478700-b869070f9279?w=800&q=80", title: "Corte del Director" },
                        { type: 'video', url: "https://www.w3schools.com/html/movie.mp4", thumb: "https://images.unsplash.com/photo-1492691523567-30730029d031?w=800&q=80", title: "Detalles Técnicos" }
                    ]
                },
                { 
                    id: 2, 
                    title: "LIQUID FLOW", 
                    category: "Diseño", 
                    img: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1200&q=80", 
                    tag: "Branding",
                    span: "col-span-1",
                    description: "Identidad visual fluida diseñada para la adaptabilidad en entornos digitales dinámicos.",
                    items: [
                        { type: 'image', url: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1200&q=80", title: "Visual Core" }
                    ]
                },
                { 
                    id: 3, 
                    title: "ALGO DOMINANCE", 
                    category: "Social Media", 
                    img: "https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=1200&q=80", 
                    tag: "Strategy",
                    span: "col-span-1",
                    description: "Estrategias basadas en datos que hackean la atención y escalan comunidades orgánicas.",
                    items: [
                        { type: 'image', url: "https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=1200&q=80", title: "Growth Loop" }
                    ]
                }
            ];

            const filteredProjects = activeFilter === 'Todos' ? projects : projects.filter(p => p.category === activeFilter);

            return (
                <div className="relative z-10 min-h-screen">
                    
                    {/* NAVEGACIÓN MODERNA */}
                    <nav className="fixed top-6 left-1/2 -translate-x-1/2 z-[200] w-[90%] max-w-5xl glass rounded-2xl px-8 py-4 flex justify-between items-center shadow-2xl">
                        <div className="text-xl font-extrabold tracking-tighter italic saga-display">
                            SAGA<span className="opacity-40 uppercase"> STUDIO</span>
                        </div>
                        <div className="hidden md:flex gap-10">
                            {['Inicio', 'Nosotros', 'Trabajo', 'Contacto'].map(item => (
                                <a key={item} href={`#${item.toLowerCase()}`} className="text-[10px] font-bold uppercase tracking-[0.3em] text-white/50 hover:text-white transition-all">{item}</a>
                            ))}
                        </div>
                        <button className="bg-white text-black px-6 py-2.5 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:scale-105 active:scale-95 transition-all">Contacto</button>
                    </nav>

                    {/* HERO SECTION */}
                    <section id="inicio" className="h-screen flex flex-col justify-center items-center px-6 text-center relative overflow-hidden">
                        <div className="max-w-6xl">
                            <span className="inline-block text-[10px] font-bold uppercase tracking-[0.6em] text-white/40 mb-6 border-b border-white/10 pb-2">
                                REVOLUCIONANDO EL CONTENIDO DIGITAL
                            </span>
                            <h1 className="text-[12vw] md:text-[9vw] font-extrabold leading-[0.8] tracking-tighter uppercase mb-8">
                                <span className="mask-text"><span className="reveal-up inline-block">BEYOND THE</span></span>
                                <span className="mask-text italic opacity-30"><span className="reveal-up inline-block" style={{animationDelay: '0.2s'}}>ORDINARY</span></span>
                                <span className="mask-text"><span className="reveal-up inline-block" style={{animationDelay: '0.4s'}}>SAGA.</span></span>
                            </h1>
                            <p className="text-white/40 max-w-xl mx-auto text-lg md:text-xl font-light leading-relaxed italic mb-12">
                                Estrategia de alto rendimiento y narrativa visual para marcas que no se conforman con el ruido.
                            </p>
                            <div className="flex justify-center gap-6">
                                <a href="#nosotros" className="interactive w-16 h-16 rounded-full border border-white/20 flex items-center justify-center hover:bg-white hover:text-black transition-all">
                                    <i data-lucide="arrow-down" className="w-5 h-5"></i>
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* SECCIÓN QUIENES SOMOS (NOSOTROS) */}
                    <section id="nosotros" className="py-32 px-6 md:px-20 max-w-[1400px] mx-auto scroll-mt-24">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-16 items-center">
                            <div className="lg:col-span-5">
                                <span className="text-[10px] font-bold uppercase tracking-[0.6em] text-purple-500 mb-4 block">NUESTRO ADN</span>
                                <h2 className="text-5xl md:text-7xl font-bold uppercase italic tracking-tighter leading-none mb-8">
                                    LA SAGA <br/> DETRÁS DEL <br/> FRAME.
                                </h2>
                                <p className="text-white/50 text-xl font-light leading-relaxed italic mb-10">
                                    SAGA no es solo un estudio; es una factoría de narrativas contemporáneas. Nacimos de la intersección entre la analítica de datos y el cine experimental.
                                </p>
                                <div className="flex flex-col gap-6">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-px bg-white/20"></div>
                                        <span className="text-sm font-bold uppercase tracking-widest">+50 Marcas Escalandas</span>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-px bg-white/20"></div>
                                        <span className="text-sm font-bold uppercase tracking-widest">Retención Superior al 85%</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="lg:col-span-7 grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="glass p-10 rounded-[2.5rem] flex flex-col justify-between group hover:bg-white/10 transition-all cursor-none interactive">
                                    <div className="mb-10 text-purple-400">
                                        <i data-lucide="zap" className="w-10 h-10"></i>
                                    </div>
                                    <div>
                                        <h3 className="text-2xl font-bold uppercase mb-4 tracking-tighter">Velocidad</h3>
                                        <p className="text-white/40 text-sm italic">Entregas en tiempo récord sin sacrificar la calidad cinematográfica que nos define.</p>
                                    </div>
                                </div>
                                <div className="glass p-10 rounded-[2.5rem] flex flex-col justify-between group hover:bg-white/10 transition-all mt-0 md:mt-12 cursor-none interactive">
                                    <div className="mb-10 text-blue-400">
                                        <i data-lucide="eye" className="w-10 h-10"></i>
                                    </div>
                                    <div>
                                        <h3 className="text-2xl font-bold uppercase mb-4 tracking-tighter">Visión</h3>
                                        <p className="text-white/40 text-sm italic">Detectamos tendencias antes de que el algoritmo las convierta en ruido masivo.</p>
                                    </div>
                                </div>
                                <div className="glass p-10 rounded-[2.5rem] flex flex-col justify-between group hover:bg-white/10 transition-all cursor-none interactive">
                                    <div className="mb-10 text-orange-400">
                                        <i data-lucide="trending-up" className="w-10 h-10"></i>
                                    </div>
                                    <div>
                                        <h3 className="text-2xl font-bold uppercase mb-4 tracking-tighter">Impacto</h3>
                                        <p className="text-white/40 text-sm italic">Estrategias diseñadas para convertir visualizaciones en comunidades leales y rentables.</p>
                                    </div>
                                </div>
                                <div className="glass p-10 rounded-[2.5rem] flex flex-col justify-between group hover:bg-white/10 transition-all mt-0 md:mt-12 cursor-none interactive">
                                    <div className="mb-10 text-green-400">
                                        <i data-lucide="command" className="w-10 h-10"></i>
                                    </div>
                                    <div>
                                        <h3 className="text-2xl font-bold uppercase mb-4 tracking-tighter">Maestría</h3>
                                        <p className="text-white/40 text-sm italic">Control total sobre el proceso creativo: desde el guion hasta el diseño sonoro final.</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* SECCIÓN TRABAJO - BENTO GRID */}
                    <section id="trabajo" className="py-32 px-6 md:px-20 max-w-[1400px] mx-auto border-t border-white/5 scroll-mt-24">
                        <div className="flex flex-col md:flex-row justify-between items-baseline mb-20 gap-8">
                            <h2 className="text-5xl md:text-7xl font-bold uppercase italic tracking-tighter">TRABAJOS.</h2>
                            <div className="flex gap-3 glass p-1.5 rounded-2xl">
                                {['Todos', 'Video', 'Diseño'].map(f => (
                                    <button 
                                        key={f} 
                                        onClick={() => setActiveFilter(f)} 
                                        className={`px-6 py-2.5 rounded-xl text-[10px] font-bold uppercase tracking-widest transition-all ${activeFilter === f ? 'bg-white text-black' : 'text-white/40 hover:text-white'}`}
                                    >
                                        {f}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-6">
                            {filteredProjects.map((p) => (
                                <div 
                                    key={p.id} 
                                    onClick={() => setSelectedProject(p)}
                                    className={`group relative overflow-hidden rounded-[2.5rem] glass project-card cursor-none interactive ${p.span}`}
                                >
                                    <div className="aspect-[16/10] md:aspect-auto md:h-[500px] overflow-hidden">
                                        <img src={p.img} className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-1000 opacity-60 group-hover:opacity-100 group-hover:scale-110" alt={p.title} />
                                    </div>
                                    <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-80"></div>
                                    <div className="absolute bottom-8 left-10 right-10 flex justify-between items-end">
                                        <div>
                                            <span className="text-[10px] font-bold uppercase tracking-widest text-white/30 mb-2 block italic">{p.category}</span>
                                            <h3 className="text-3xl font-bold uppercase tracking-tighter">{p.title}</h3>
                                        </div>
                                        <div className="w-14 h-14 rounded-2xl glass flex items-center justify-center group-hover:bg-white group-hover:text-black transition-all">
                                            <i data-lucide="plus" className="w-6 h-6"></i>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* MODAL DE PROYECTO (DASHBOARD) */}
                    {selectedProject && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-black/95 backdrop-blur-2xl" onClick={() => setSelectedProject(null)}></div>
                            <div className="relative bg-[#0a0a0a] w-full max-w-6xl h-full max-h-[85vh] rounded-[3rem] border border-white/10 overflow-hidden flex flex-col shadow-2xl animate-in zoom-in-95 duration-500">
                                <div className="p-8 md:p-12 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                                    <div>
                                        <span className="text-[10px] font-bold text-white/30 uppercase tracking-[0.4em] block mb-2">ARCHIVE_PROJECT</span>
                                        <h2 className="text-4xl md:text-5xl font-bold uppercase italic tracking-tighter leading-none">{selectedProject.title}</h2>
                                    </div>
                                    <button onClick={() => setSelectedProject(null)} className="w-14 h-14 glass hover:bg-white hover:text-black rounded-2xl flex items-center justify-center transition-all">
                                        <i data-lucide="x" className="w-6 h-6"></i>
                                    </button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-8 md:p-12 custom-scrollbar">
                                    <p className="text-2xl text-white/50 mb-16 italic font-light leading-relaxed max-w-2xl">{selectedProject.description}</p>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        {selectedProject.items.map((item, i) => (
                                            <div key={i} onClick={() => setActiveMedia(item)} className="group relative aspect-video rounded-3xl overflow-hidden cursor-none interactive glass">
                                                <img src={item.thumb || item.url} className="w-full h-full object-cover opacity-40 group-hover:opacity-100 transition-all duration-700" alt={item.title} />
                                                <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black/40">
                                                    <div className="w-16 h-16 bg-white text-black rounded-full flex items-center justify-center shadow-2xl scale-75 group-hover:scale-100 transition-all duration-500">
                                                        {item.type === 'video' ? <i data-lucide="play" className="w-6 h-6 fill-current"></i> : <i data-lucide="maximize" className="w-6 h-6"></i>}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* LIGHTBOX FINAL */}
                    {activeMedia && (
                        <div className="fixed inset-0 z-[400] flex items-center justify-center p-4 bg-black/98" onClick={() => setActiveMedia(null)}>
                            <div className="relative w-full max-w-5xl aspect-video rounded-3xl overflow-hidden shadow-2xl" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setActiveMedia(null)} className="absolute top-6 right-6 z-50 w-12 h-12 bg-white/10 hover:bg-white text-white hover:text-black rounded-full flex items-center justify-center backdrop-blur-md transition-all">
                                    <i data-lucide="x" className="w-6 h-6"></i>
                                </button>
                                {activeMedia.type === 'video' ? (
                                    <video src={activeMedia.url} controls autoPlay className="w-full h-full bg-black object-contain" />
                                ) : (
                                    <img src={activeMedia.url} className="w-full h-full object-contain" alt={activeMedia.title} />
                                )}
                            </div>
                        </div>
                    )}

                    {/* FOOTER */}
                    <footer id="contacto" className="py-40 px-6 md:px-20 border-t border-white/5 relative overflow-hidden bg-[#020202]">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-end gap-20">
                            <div>
                                <h2 className="text-[14vw] md:text-[10vw] font-extrabold leading-[0.8] tracking-tighter uppercase italic">START<br/>LEGEND.</h2>
                                <div className="mt-12 flex flex-wrap gap-12">
                                    {['Instagram', 'LinkedIn', 'Behance'].map(social => (
                                        <a key={social} href="#" className="text-[10px] font-bold uppercase tracking-[0.4em] text-white/20 hover:text-white transition-all underline underline-offset-8 decoration-white/10">{social}</a>
                                    ))}
                                </div>
                            </div>
                            <div className="text-right">
                                <p className="text-white/40 text-xl font-light italic mb-8 max-w-xs ml-auto">Elevamos tu narrativa digital al nivel de una saga épica.</p>
                                <p className="text-[10px] font-bold uppercase tracking-[0.6em] text-white/10">© 2026 SAGA STUDIO STUDIO</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
