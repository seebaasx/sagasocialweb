<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGA | Social Media Studio</title>
    
    <!-- TAILWIND CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FUENTES: Syne para impacto y Inter para limpieza -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a0b;
            --accent: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg);
            margin: 0;
            overflow-x: hidden;
            color: #fff;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, .saga-font { 
            font-family: 'Syne', sans-serif; 
            letter-spacing: -0.03em;
        }
        
        /* Cursor sutil */
        #cursor {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transition: transform 0.1s ease-out, opacity 0.3s;
            left: 0;
            top: 0;
        }

        /* Efecto de grano */
        .grain {
            position: fixed;
            inset: 0;
            z-index: 50;
            pointer-events: none;
            opacity: 0.02;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
        }

        /* Animaciones */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Ken Burns Effect para el Carrusel */
        @keyframes kenburns {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
        .animate-kenburns {
            animation: kenburns 10s ease-out forwards;
        }

        /* Glassmorphism */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            transition: all 0.5s ease;
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

        html { scroll-behavior: smooth; }

        /* Icon fix */
        [data-lucide] {
            display: inline-block;
            vertical-align: middle;
        }
    </style>
</head>
<body class="cursor-none">
    <div id="cursor"></div>
    <div class="grain"></div>
    
    <div id="root"></div>

    <!-- DEPENDENCIAS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- LÓGICA REACT -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [activeFilter, setActiveFilter] = useState('Todos');
            const [selectedProject, setSelectedProject] = useState(null);
            const [activeMedia, setActiveMedia] = useState(null);
            const [isContactOpen, setIsContactOpen] = useState(false);
            const [currentSlide, setCurrentSlide] = useState(0);

            const heroSlides = [
                {
                    title: "SAGA.",
                    subtitle: "VISUAL STORIES",
                    img: "https://images.unsplash.com/photo-1492691523567-30730029d031?w=1600&q=80"
                },
                {
                    title: "SOCIAL.",
                    subtitle: "HIGH FREQUENCY",
                    img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=1600&q=80"
                },
                {
                    title: "STUDIO.",
                    subtitle: "ALGO STRATEGY",
                    img: "https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=1600&q=80"
                }
            ];

            useEffect(() => {
                const cursor = document.getElementById('cursor');
                const moveCursor = (e) => {
                    requestAnimationFrame(() => {
                        cursor.style.transform = `translate3d(${e.clientX - 4}px, ${e.clientY - 4}px, 0)`;
                    });
                };
                window.addEventListener('mousemove', moveCursor);

                const timer = setInterval(() => {
                    setCurrentSlide((prev) => (prev + 1) % heroSlides.length);
                }, 5000);

                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) entry.target.classList.add('visible');
                    });
                }, { threshold: 0.1 });

                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
                if (window.lucide) window.lucide.createIcons();
                
                return () => {
                    window.removeEventListener('mousemove', moveCursor);
                    clearInterval(timer);
                    observer.disconnect();
                };
            }, []);

            const projects = [
                { 
                    id: 1, 
                    title: "ESSENCE", 
                    category: "Video", 
                    img: "https://images.unsplash.com/photo-1536240478700-b869070f9279?w=1200&q=80", 
                    tag: "Production",
                    span: "col-span-1 md:col-span-2 h-[400px] md:h-[600px]",
                    description: "Capturando la pureza del movimiento en un formato cinematográfico vertical.",
                    items: [
                        { type: 'video', url: "https://www.w3schools.com/html/mov_bbb.mp4", thumb: "https://images.unsplash.com/photo-1536240478700-b869070f9279?w=800&q=80", title: "Video Cut" }
                    ]
                },
                { 
                    id: 2, 
                    title: "MINIMAL", 
                    category: "Diseño", 
                    img: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1200&q=80", 
                    tag: "Branding",
                    span: "col-span-1 h-[400px]",
                    description: "Identidad visual de alto nivel basada en la supresión de lo innecesario.",
                    items: [
                        { type: 'image', url: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1200&q=80", title: "Brand Core" }
                    ]
                },
                { 
                    id: 3, 
                    title: "GROWTH", 
                    category: "Social Media", 
                    img: "https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=1200&q=80", 
                    tag: "Strategy",
                    span: "col-span-1 h-[400px]",
                    description: "Escalando marcas mediante narrativa orgánica y coherencia estética.",
                    items: [
                        { type: 'image', url: "https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=1200&q=80", title: "Strategy" }
                    ]
                }
            ];

            const filteredProjects = activeFilter === 'Todos' ? projects : projects.filter(p => p.category === activeFilter);

            return (
                <div className="relative min-h-screen pb-20">
                    
                    {/* NAV: FLOTANTE */}
                    <nav className="fixed top-8 left-1/2 -translate-x-1/2 z-[200] bg-white/5 backdrop-blur-xl border border-white/10 px-8 py-4 rounded-full flex items-center gap-6 md:gap-12 shadow-2xl">
                        <div className="text-xl font-bold tracking-tighter uppercase saga-font">SAGA</div>
                        <div className="hidden md:flex gap-8">
                            {['Inicio', 'Estudio', 'Index'].map(item => (
                                <a key={item} href={`#${item.toLowerCase()}`} className="text-[10px] font-medium uppercase tracking-[0.4em] text-white/50 hover:text-white transition-all">{item}</a>
                            ))}
                        </div>
                        <button onClick={() => setIsContactOpen(true)} className="text-[10px] font-bold uppercase tracking-[0.2em] bg-white text-black px-5 py-2 rounded-full hover:scale-105 active:scale-95 transition-all">Hablemos</button>
                    </nav>

                    {/* HERO CAROUSEL */}
                    <section id="inicio" className="relative h-screen w-full overflow-hidden">
                        {heroSlides.map((slide, idx) => (
                            <div 
                                key={idx}
                                className={`absolute inset-0 transition-opacity duration-1000 ease-in-out ${currentSlide === idx ? 'opacity-100 z-10' : 'opacity-0 z-0'}`}
                            >
                                {/* Background Image with Ken Burns */}
                                <div className="absolute inset-0">
                                    <img 
                                        src={slide.img} 
                                        className={`w-full h-full object-cover grayscale opacity-40 ${currentSlide === idx ? 'animate-kenburns' : ''}`}
                                        alt={slide.title}
                                    />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black/20"></div>
                                </div>

                                {/* Content Overlay */}
                                <div className="relative h-full flex flex-col justify-center items-center text-center px-6">
                                    <span className="text-[10px] font-medium uppercase tracking-[1em] text-white/40 mb-6 block overflow-hidden">
                                        <span className={`block transition-transform duration-700 delay-300 ${currentSlide === idx ? 'translate-y-0' : 'translate-y-full'}`}>
                                            {slide.subtitle}
                                        </span>
                                    </span>
                                    <h1 className="text-[22vw] md:text-[16vw] font-black leading-none uppercase saga-font overflow-hidden">
                                        <span className={`block transition-transform duration-1000 ${currentSlide === idx ? 'translate-y-0' : 'translate-y-full'}`}>
                                            {slide.title}
                                        </span>
                                    </h1>
                                </div>
                            </div>
                        ))}

                        {/* Indicators / Progress Bars */}
                        <div className="absolute bottom-12 left-1/2 -translate-x-1/2 z-20 flex gap-4">
                            {heroSlides.map((_, idx) => (
                                <div 
                                    key={idx} 
                                    onClick={() => setCurrentSlide(idx)}
                                    className="w-12 h-0.5 bg-white/10 cursor-pointer relative overflow-hidden"
                                >
                                    <div 
                                        className={`absolute inset-0 bg-white transition-all duration-[5000ms] linear ${currentSlide === idx ? 'w-full' : 'w-0'}`}
                                    />
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* ESTUDIO: SOLO LA ESENCIA */}
                    <section id="estudio" className="py-40 px-8 max-w-6xl mx-auto scroll-mt-20">
                        <div className="reveal">
                            <h2 className="text-4xl md:text-6xl font-bold mb-12 saga-font uppercase italic opacity-20 tracking-tighter">EL ORIGEN.</h2>
                            <p className="text-2xl md:text-4xl font-light leading-snug italic text-white/60 mb-20 max-w-5xl">
                                SAGA es la <span className="text-white font-medium not-italic">sinergia genética</span> de Sebastián y Gabriela Acevedo. Una herencia de 10 años fusionando visión fraternal y estrategia para crear <span className="text-white font-medium not-italic">narrativas visuales</span> que no solo se consumen, sino que se recuerdan.
                            </p>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                {[
                                    { t: 'Legado', d: 'Diez años de evolución constante.' },
                                    { t: 'Sintonía', d: 'Dos visiones en un mismo eje creativo.' },
                                    { t: 'Trascendencia', d: 'Contenido diseñado para perdurar.' }
                                ].map((item, i) => (
                                    <div key={i} className="border-l border-white/10 pl-6 py-4">
                                        <h3 className="text-xs font-bold uppercase tracking-widest mb-2">{item.t}</h3>
                                        <p className="text-white/40 text-sm italic">{item.d}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* INDEX: TRABAJOS SELECCIONADOS */}
                    <section id="index" className="py-40 px-6 max-w-7xl mx-auto scroll-mt-20">
                        <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-8 reveal">
                            <h2 className="text-4xl md:text-6xl font-bold saga-font">INDEX.</h2>
                            <div className="flex gap-8">
                                {['Todos', 'Video', 'Diseño'].map(f => (
                                    <button 
                                        key={f} 
                                        onClick={() => setActiveFilter(f)} 
                                        className={`text-[10px] font-bold uppercase tracking-[0.3em] transition-all ${activeFilter === f ? 'text-white border-b border-white pb-1' : 'text-white/20 hover:text-white'}`}
                                    >
                                        {f}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {filteredProjects.map((p) => (
                                <div 
                                    key={p.id} 
                                    onClick={() => setSelectedProject(p)}
                                    className={`group relative overflow-hidden rounded-[2rem] glass-card cursor-none reveal ${p.span}`}
                                >
                                    <img src={p.img} className="w-full h-full object-cover grayscale opacity-40 group-hover:opacity-100 group-hover:grayscale-0 transition-all duration-1000 group-hover:scale-105" alt="" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-60"></div>
                                    <div className="absolute bottom-10 left-10 right-10 flex justify-between items-end">
                                        <div>
                                            <span className="text-[9px] font-bold uppercase tracking-[0.4em] text-white/30 mb-2 block italic">{p.category}</span>
                                            <h3 className="text-2xl md:text-3xl font-bold uppercase saga-font">{p.title}</h3>
                                        </div>
                                        <div className="w-12 h-12 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center border border-white/10 group-hover:bg-white group-hover:text-black transition-all duration-500">
                                            <Icon name="arrow-up-right" size={20} />
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* MODAL DE CONTACTO */}
                    {isContactOpen && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-black/95 backdrop-blur-xl animate-in fade-in" onClick={() => setIsContactOpen(false)}></div>
                            <div className="relative bg-[#0d0d0e] w-full max-w-lg rounded-[2.5rem] border border-white/5 overflow-hidden flex flex-col shadow-2xl animate-in zoom-in-95">
                                <div className="p-10 border-b border-white/5 flex justify-between items-center">
                                    <h2 className="text-3xl font-bold italic saga-font">HABLEMOS.</h2>
                                    <button onClick={() => setIsContactOpen(false)} className="hover:rotate-90 transition-all"><Icon name="x" size={24} /></button>
                                </div>
                                <div className="p-10 space-y-6">
                                    <input type="text" className="w-full bg-transparent border-b border-white/10 py-4 outline-none focus:border-white transition-colors text-lg font-light" placeholder="Nombre" />
                                    <input type="email" className="w-full bg-transparent border-b border-white/10 py-4 outline-none focus:border-white transition-colors text-lg font-light" placeholder="Email" />
                                    <textarea className="w-full bg-transparent border-b border-white/10 py-4 h-24 outline-none focus:border-white transition-colors resize-none text-lg font-light" placeholder="Tu idea..."></textarea>
                                    <button className="w-full py-5 bg-white text-black rounded-full font-bold uppercase tracking-widest hover:bg-zinc-200 transition-all">Enviar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* DASHBOARD DE PROYECTO */}
                    {selectedProject && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center">
                            <div className="absolute inset-0 bg-black/98" onClick={() => setSelectedProject(null)}></div>
                            <div className="relative bg-[#050505] w-full h-full overflow-hidden flex flex-col animate-in slide-in-from-bottom-10">
                                <div className="p-8 md:p-12 border-b border-white/5 flex justify-between items-center">
                                    <h2 className="text-3xl md:text-5xl font-bold italic saga-font">{selectedProject.title}</h2>
                                    <button onClick={() => setSelectedProject(null)} className="w-14 h-14 rounded-full border border-white/10 flex items-center justify-center hover:bg-white hover:text-black transition-all">
                                        <Icon name="x" size={28} />
                                    </button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-8 md:p-20 custom-scrollbar">
                                    <p className="text-2xl text-white/40 mb-20 italic font-light max-w-2xl">{selectedProject.description}</p>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        {selectedProject.items.map((item, i) => (
                                            <div key={i} onClick={() => setActiveMedia(item)} className="group relative aspect-video rounded-3xl overflow-hidden glass-card">
                                                <img src={item.thumb || item.url} className="w-full h-full object-cover opacity-50 group-hover:opacity-100 transition-all duration-1000" alt="" />
                                                <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black/40">
                                                    <div className="w-16 h-16 bg-white text-black rounded-full flex items-center justify-center shadow-2xl scale-75 group-hover:scale-100 transition-all duration-500">
                                                        {item.type === 'video' ? <Icon name="play" /> : <Icon name="maximize" />}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* LIGHTBOX FINAL */}
                    {activeMedia && (
                        <div className="fixed inset-0 z-[400] flex items-center justify-center p-4 bg-black/99" onClick={() => setActiveMedia(null)}>
                            <div className="relative w-full max-w-5xl aspect-video rounded-3xl overflow-hidden shadow-2xl" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setActiveMedia(null)} className="absolute top-6 right-6 z-50 w-12 h-12 bg-white/10 hover:bg-white text-white hover:text-black rounded-full flex items-center justify-center transition-all">
                                    <Icon name="x" size={24} />
                                </button>
                                {activeMedia.type === 'video' ? (
                                    <video src={activeMedia.url} controls autoPlay className="w-full h-full bg-black object-contain" />
                                ) : (
                                    <img src={activeMedia.url} className="w-full h-full object-contain" alt="" />
                                )}
                            </div>
                        </div>
                    )}

                    {/* FOOTER */}
                    <footer className="py-40 px-8 text-center">
                        <div className="reveal">
                            <h2 className="text-[12vw] font-black saga-font opacity-5 mb-12">SAGA STUDIO</h2>
                            <div className="flex justify-center gap-12 text-[10px] font-bold uppercase tracking-[0.5em] text-white/20">
                                <a href="#" className="hover:text-white transition-all">Instagram</a>
                                <a href="#" className="hover:text-white transition-all">LinkedIn</a>
                                <a href="#" className="hover:text-white transition-all">Email</a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
